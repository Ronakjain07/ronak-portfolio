<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: #0a0908; color: #ece7df; font-family: 'Manrope', sans-serif;
    display: flex; flex-direction: column; justify-content: center; padding: 0 90px;
  }
  .glow-a, .glow-b {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: .5;
  }
  .glow-a { width: 560px; height: 560px; background: radial-gradient(circle, rgba(238,185,107,.5), transparent 65%); right: -140px; bottom: -220px; }
  .glow-b { width: 420px; height: 420px; background: radial-gradient(circle, rgba(194,84,42,.45), transparent 65%); right: 220px; bottom: -260px; }
  .dots { position: absolute; inset: 0; }
  .dots span { position: absolute; border-radius: 50%; background: #eeb96b; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 21px; font-weight: 600; letter-spacing: .3em; text-transform: uppercase;
    color: #8f887c; margin-bottom: 34px;
  }
  .eyebrow::before { content: ''; width: 46px; height: 2px; background: #eeb96b; }
  h1 {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 118px; line-height: .98;
    text-transform: uppercase; letter-spacing: -0.01em;
    background: linear-gradient(100deg, #f7ecd9 5%, #eeb96b 55%, #d0662f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .role {
    margin-top: 30px; font-size: 34px; font-weight: 600; color: #ece7df;
  }
  .role em { font-family: 'Instrument Serif', serif; font-style: italic; color: #eeb96b; }
  .foot {
    margin-top: 40px; font-size: 22px; color: #8f887c; letter-spacing: .06em;
  }
  .foot b { color: #cfc8bc; font-weight: 600; }
  .grain {
    position: absolute; inset: 0; opacity: .07; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }
</style>
</head>
<body>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="dots" id="dots"></div>
  <div class="eyebrow">Portfolio · From Prompt to Production</div>
  <h1>Ronak Jain</h1>
  <p class="role">AI Engineer <em>&amp; full-stack developer</em></p>
  <p class="foot"><b>Yellow.ai</b> · VIT Vellore · LLMs, Agentic AI &amp; React</p>
  <div class="grain"></div>
  <script>
    // scatter a loose particle dune along the bottom-right, like the site hero
    const dots = document.getElementById('dots')
    for (let i = 0; i < 260; i++) {
      const s = document.createElement('span')
      const size = 1.5 + Math.random() * 4.5
      const x = 380 + Math.random() * 860
      const yBase = 470 - (x - 380) * 0.12
      const y = yBase + (Math.random() - 0.5) * 150 + Math.random() * 120
      const o = 0.25 + Math.random() * 0.75
      const warm = Math.random()
      s.style.cssText =
        'width:' + size + 'px;height:' + size + 'px;left:' + x + 'px;top:' + y +
        'px;opacity:' + o + ';background:' + (warm > 0.6 ? '#f5c26b' : warm > 0.3 ? '#e8955b' : '#c2542a') +
        ';filter:blur(' + (Math.random() > 0.7 ? 1.5 : 0) + 'px)'
      dots.appendChild(s)
    }
  </script>
</body>
</html>
